name: Bug Report
description: Report a reproducible problem in ScholarRef.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear, concise bug description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps (include command line / mode / files).
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., v1.0.0"

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, and relevant package versions.
      placeholder: "Windows 11, Python 3.12, python-docx ..."

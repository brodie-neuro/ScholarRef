name: Suggestion
description: Propose an enhancement or workflow improvement.
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation are you hitting?
      placeholder: Describe the user need.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should ScholarRef do?
      placeholder: Describe expected behavior and UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any workaround or other options considered.

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how often this would be used.
